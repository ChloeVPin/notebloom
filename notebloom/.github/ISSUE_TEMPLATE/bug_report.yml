name: Bug report
description: Report something that is broken or unexpected
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so the issue can be reproduced.
      placeholder: |
        1. Open Notebloom
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Notebloom version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows version
      placeholder: Windows 11 / Windows 10
    validations:
      required: false

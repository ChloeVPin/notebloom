name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like to add?
      description: Describe the feature or improvement clearly.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Explain the user need or workflow gap.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Screenshots, examples, or related notes.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Notebloom version
      placeholder: 1.1.0
    validations:
      required: false

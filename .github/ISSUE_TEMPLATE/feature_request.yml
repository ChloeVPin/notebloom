name: Feature Request
description: Suggest an improvement or new capability for Notebloom
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are tracked separately from bugs so planning stays clean.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the friction or missing workflow.
      placeholder: "I need a faster way to find older notes."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal behavior in simple terms.
      placeholder: "Add note search in the sidebar with keyword filtering."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround you currently use.
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Mockups, examples, links, or references.

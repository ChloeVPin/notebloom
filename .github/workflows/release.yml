name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: notebloom
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: notebloom/frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true
          cache-dependency-path: notebloom/go.sum

      - name: Setup Wails
        uses: wailsapp/setup-wails@v5
        with:
          wails-version: v2.11.0

      - name: Install frontend dependencies
        run: npm ci
        working-directory: notebloom/frontend

      - name: Build Windows installer
        run: wails build -nsis

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $installer = Get-ChildItem build\bin -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer not found in build\\bin."
          }

          Copy-Item $installer.FullName release-artifacts\
          Copy-Item ..\CHANGELOG.md release-artifacts\CHANGELOG.md

          $changelog = Get-Content ..\CHANGELOG.md -Raw
          $match = [regex]::Match($changelog, '(?ms)^## Version .*?(?=\r?\n## Version |\z)')
          if (-not $match.Success) {
            throw "Unable to extract release notes from CHANGELOG.md."
          }

          Set-Content -Path release-artifacts\release-notes.md -Value $match.Value

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notebloom/release-artifacts/release-notes.md
          files: |
            notebloom/release-artifacts/*.exe
            notebloom/release-artifacts/CHANGELOG.md

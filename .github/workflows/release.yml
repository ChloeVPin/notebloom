name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\go\bin\wails.exe" version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installer
        run: wails build -nsis

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null

          $installer = Get-ChildItem build -Recurse -File -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $installer) {
            $installer = Get-ChildItem build -Recurse -File -Filter "*.exe" | Select-Object -First 1
          }
          if (-not $installer) {
            throw "Installer not found in build\\bin."
          }

          Copy-Item $installer.FullName release-artifacts\
          Copy-Item CHANGELOG.md release-artifacts\CHANGELOG.md

          $changelog = Get-Content CHANGELOG.md -Raw
          $match = [regex]::Match($changelog, '(?ms)^## .*?(?=^## |\z)')
          if (-not $match.Success) {
            throw "Unable to extract release notes from CHANGELOG.md."
          }

          Set-Content -Path release-artifacts\release-notes.md -Value ("# Notebloom " + $env:GITHUB_REF_NAME + "`n`n" + $match.Value.Trim() + "`n") -Encoding UTF8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-artifacts/release-notes.md
          files: |
            release-artifacts/*.exe
            release-artifacts/CHANGELOG.md
